  {id:"p1",q:"Αν σκεφτείς το τελευταίο βιβλίο που διάβασες, podcast που άκουσες, ή σειρά που είδες — ποιο ήταν και γιατί σε τράβηξε; Αν δεν κάνεις κάτι από αυτά, πες μας τι κάνεις στον ελεύθερο χρόνο σου.",h:"Μην γράψεις κάτι για εντύπωση — θέλουμε αυθεντικότητα."},
  {id:"p2",q:"Μαγειρεύεις; Αν ναι, ποιο είναι εκείνο το φαγητό που φτιάχνεις καλύτερα από τον καθένα; Αν όχι, ποιο φαγητό θα ήθελες να μπορείς να φτιάχνεις;",h:""},

  {id:"p4",q:"Έχεις ζήσει ποτέ μακριά από το σπίτι σου για αρκετό καιρό; Αν ναι, πώς ήταν η εμπειρία και πώς το διαχειρίστηκες; Αν όχι, πώς φαντάζεσαι ότι θα ήταν;",h:""},
  {id:"p5",q:"Ποια ομάδα υποστηρίζεις — ποδόσφαιρο, μπάσκετ, ή κάτι άλλο; Ή μήπως δεν σε ενδιαφέρει καθόλου ο αθλητισμός; Όλα δεκτά.",h:""}

// ── CHARACTER ──
var cQ=[
  {id:"c1",t:"o",q:"Είσαι μέσα σε μια ομαδική εργασία στη σχολή, και ένα μέλος της ομάδας συστηματικά δεν κάνει τίποτα — δεν απαντάει σε μηνύματα, δεν παραδίδει τα μέρη του, και γενικά σας αφήνει στον αέρα. Τι κάνεις ρεαλιστικά; Όχι τι θα έπρεπε να κάνεις θεωρητικά — τι κάνεις στην πράξη;",h:""},

  {id:"c3",t:"m",q:"Τελειώνει η εβδομάδα, είναι Παρασκευή βράδυ. Τι κάνεις συνήθως;",o:["Βγαίνω με παρέα — κοινωνικότητα πάνω απ' όλα","Μένω σπίτι — σειρά, gaming, χαλάρωμα","Δουλεύω σε κάποιο δικό μου project","Εξαρτάται εντελώς — κάθε Παρασκευή είναι διαφορετική"]},
  {id:"c4",t:"o",q:"Φαντάσου ότι σου δίνουμε ένα project εντελώς χωρίς οδηγίες — μόνο το τελικό ζητούμενο. Δεν υπάρχει documentation, δεν υπάρχει κάποιος να ρωτήσεις αμέσως. Ποιο είναι κυριολεκτικά το πρώτο πράγμα που κάνεις;",h:""},
  {id:"c5",t:"o",q:"Ποια είναι η πιο απρόσμενη ικανότητα ή γνώση που έχεις — κάτι που αν το μάθαινε κάποιος θα εκπλαγεί; Κάτι εντελώς off-topic, fun, ή weird.",h:"Εδώ θέλουμε να δούμε χιούμορ και προσωπικότητα."},
  {id:"c6",t:"s",q:"Πόσο σε εκφράζει η παρακάτω πρόταση; «Προτιμώ να κάνω κάτι μέτρια μόνος μου, παρά κάτι τέλεια σε ομάδα.»",sl:["Καθόλου","Λίγο","Μέτρια","Αρκετά","Απόλυτα"]}
];

// ── MBTI LIKERT (1-7 scale) ──
var mQ=[
  {d:"EI",q:"Σε ένα event ή συνέδριο, τι σε περιγράφει καλύτερα;",lo:"Μιλάω σε όσους περισσότερους μπορώ, μου δίνει ενέργεια",hi:"Βρίσκω 1-2 άτομα για ουσιαστική κουβέντα και αυτό μου αρκεί",lV:"E",hV:"I"},
  {d:"EI",q:"Μετά από μια κουραστική μέρα, πώς ξαναφορτίζεις;",lo:"Βγαίνω με φίλους, socializing, κόσμος γύρω μου",hi:"Ησυχία, μόνος μου χρόνος, χόμπι χωρίς παρέα",lV:"E",hV:"I"},
  {d:"EI",q:"Στο εργασιακό σου περιβάλλον, τι λειτουργεί καλύτερα για σένα;",lo:"Open χώρος, brainstorming, συνεχής επικοινωνία με ομάδα",hi:"Δικός μου χώρος, focus χωρίς διακοπές, δουλεύω καλύτερα μόνος",lV:"E",hV:"I"},
  {d:"SN",q:"Όταν αντιμετωπίζεις ένα πρόβλημα, από πού ξεκινάς;",lo:"Μαζεύω δεδομένα, κοιτάω τα facts, βήμα-βήμα ανάλυση",hi:"Κοιτάω τη μεγάλη εικόνα πρώτα, σκέφτομαι εναλλακτικές και πιθανότητες",lV:"S",hV:"N"},
  {d:"SN",q:"Σε ένα νέο project, τι σε ενθουσιάζει περισσότερο;",lo:"Η υλοποίηση — να πιάσω κατσαβίδι, να δω κάτι να δουλεύει",hi:"Ο σχεδιασμός — να σκεφτώ νέες αρχιτεκτονικές, νέες προσεγγίσεις",lV:"S",hV:"N"},
  {d:"SN",q:"Πώς θα περιέγραφες τον τρόπο που σκέφτεσαι γενικά;",lo:"Πρακτικός, ρεαλιστής, εστιάζω σε αυτό που δουλεύει τώρα",hi:"Δημιουργικός, οραματιστής, σκέφτομαι τι θα μπορούσε να γίνει",lV:"S",hV:"N"},
  {d:"TF",q:"Όταν πρέπει να πάρεις μια δύσκολη απόφαση, τι μετράει περισσότερο;",lo:"Η λογική, τα δεδομένα, και η αντικειμενική ανάλυση",hi:"Πώς θα επηρεαστούν οι άνθρωποι γύρω μου, η ανθρώπινη πλευρά",lV:"T",hV:"F"},
  {d:"TF",q:"Σε μια διαφωνία με συνάδελφο ή συμφοιτητή, πώς τη χειρίζεσαι;",lo:"Εστιάζω στο ποιος έχει δίκιο βάσει γεγονότων και στοιχείων",hi:"Ψάχνω λύση που ικανοποιεί όλους, ακόμα κι αν δεν είναι η ιδανική τεχνικά",lV:"T",hV:"F"},
  {d:"TF",q:"Τι εκτιμάς περισσότερο σε μια ομάδα;",lo:"Αποτελεσματικότητα, ικανότητα, ποιότητα δουλειάς",hi:"Καλή ατμόσφαιρα, αρμονία, σωστή επικοινωνία",lV:"T",hV:"F"},

  {d:"JP",q:"Πώς οργανώνεις τη μέρα σου;",lo:"To-do lists, agenda, δομημένο πρόγραμμα — μ' αρέσει η τάξη",hi:"Πάω με τη ροή, αυτοσχεδιάζω, δεν με βοηθούν τα αυστηρά πλάνα",lV:"J",hV:"P"},
  {d:"JP",q:"Αν σχεδιάζεις ένα ταξίδι, τι κάνεις;",lo:"Κλείνω ξενοδοχεία, φτιάχνω itinerary, θέλω να ξέρω τι θα κάνω",hi:"Αποφασίζω on the spot — η ευελιξία είναι μέρος της εμπειρίας",lV:"J",hV:"P"}
];

// ── SCENARIOS (open) ──
var sQ=[
  {id:"s1",q:"Φαντάσου ένα πυκνό νησιωτικό σύμπλεγμα στην Ελλάδα — σαν τις Κυκλάδες. Δεκάδες νησιά κοντά μεταξύ τους, με μόνιμους κατοίκους, τουρίστες, και ανάγκη για αξιόπιστη επικοινωνία τόσο μεταξύ τους όσο και με τον υπόλοιπο κόσμο. Αν σου ζητούσαν να σχεδιάσεις το τηλεπικοινωνιακό δίκτυο από το μηδέν, χρησιμοποιώντας όλες τις σύγχρονες τεχνολογίες που έχεις στη διάθεσή σου, πώς θα το έκανες; Εξήγησε τη σκέψη σου.",h:"Δεν χρειάζεται η τέλεια απάντηση — θέλουμε να δούμε πώς δομείς ένα πρόβλημα."},
  {id:"s2",q:"Ένας ηλιακός θερμοσίφωνας χρησιμοποιεί τον ήλιο για να ζεστάνει νερό. Η Componous κατασκευάζει αισθητήρες οπτικών ινών (FBG) που μετρούν θερμοκρασία και παραμόρφωση σε βιομηχανικές εφαρμογές. Θα πρότεινες τη χρήση ενός τέτοιου αισθητήρα για τη μέτρηση θερμοκρασίας σε έναν οικιακό ηλιακό θερμοσίφωνα; Γιατί ναι ή γιατί όχι; Σκέψου κόστος, ανάγκες, εναλλακτικές.",h:"Η σωστή απάντηση μπορεί να είναι και «όχι» — θέλουμε κρίση, όχι πώληση."},
  {id:"s3",q:"Στη σύγχρονη ηλεκτρονική σχεδίαση, υπάρχει πληθώρα από έτοιμα integrated circuits (ICs) σχεδόν για κάθε πρόβλημα — ενισχυτές, ADCs, μικροελεγκτές, drivers. Ταυτόχρονα, μπορείς να σχεδιάσεις κάτι custom από το μηδέν (discrete κύκλωμα, FPGA, custom ASIC). Πότε θα αποφάσιζες να χρησιμοποιήσεις ένα έτοιμο IC και πότε να αναπτύξεις κάτι δικό σου; Ποια κριτήρια θα χρησιμοποιούσες;",h:""},
  {id:"s4",q:"Χρησιμοποίησες κάποιο AI tool (ChatGPT, Claude, Gemini, κλπ) για τις απαντήσεις σου σε αυτό το ερωτηματολόγιο; Αν ναι, σε ποιες ερωτήσεις και πόσο σε βοήθησε;",h:"Δεν εξετάζεσαι — επιτρέπεται. Be honest. Θέλουμε να δούμε αν αναγνωρίζεις πότε ένα εργαλείο σε βοηθά πραγματικά και πότε όχι."}
];

function E(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function mbtiCalc(){
  // Each dimension: average of 3 questions (1-7 scale). <=3.5 = left trait, >3.5 = right trait
  var dims={EI:[],SN:[],TF:[],JP:[]};
  for(var k in ma){if(ma.hasOwnProperty(k)){var q=mQ[parseInt(k)];if(q)dims[q.d].push(ma[k])}}

  return(ei<=3.5?mQ[0].lV:mQ[0].hV)+(sn<=3.5?mQ[3].lV:mQ[3].hV)+(tf<=3.5?mQ[6].lV:mQ[6].hV)+(jp<=3.5?mQ[9].lV:mQ[9].hV);
}

    '<div><span class="lb">Ονοματεπώνυμο *</span><input type="text" id="fn" value="'+E(inf.n)+'" placeholder="π.χ. Μαρία Παπαδοπούλου"></div>'+
    '<div><span class="lb">Email *</span><input type="email" id="fe" value="'+E(inf.e)+'" placeholder="email@example.com"></div>'+
    '<div><span class="lb">Τηλέφωνο</span><input type="text" id="fp" value="'+E(inf.p)+'" placeholder="69..."></div>'+
    '<div><span class="lb">Έτος σπουδών</span><select id="fy">'+so(["","3ο έτος","4ο έτος","5ο έτος","Μεταπτυχιακό","Απόφοιτος"],inf.y)+'</select></div>'+
    '<div><span class="lb">Κατεύθυνση / Εξειδίκευση</span><select id="fd">'+so(["","Φωτονική / Οπτοηλεκτρονική","Ηλεκτρονική / Κυκλώματα","Τηλεπικοινωνίες","Ενέργεια","Embedded / Software","Υλικά / Νανοτεχνολογία","Μηχανολογία / Composites","Άλλο"],inf.d)+'</select></div>'+
    '<div><span class="lb">Τι σε ενδιαφέρει;</span><select id="fi">'+so(["","Πρακτική Άσκηση","Θέση Εργασίας","Και τα δύο","Θέλω να μάθω περισσότερα"],inf.i)+'</select></div>'+
  '</div><div class="br"><button class="bn" id="b0">Πάμε παρακάτω →</button></div></div>';
  G("b0").onclick=function(){inf.n=G("fn").value;inf.e=G("fe").value;inf.p=G("fp").value;inf.y=G("fy").value;inf.d=G("fd").value;inf.i=G("fi").value;if(!inf.n.trim()||!inf.e.trim()){alert("Συμπλήρωσε τουλάχιστον όνομα και email.");return}sec=1;go()};
}

// ── 1 PSYCHO ──
function r1(){
  var ids=[];var h='<div class="sc"><div class="tt">Ψυχογράφημα</div><div class="su">Σε αυτή την ενότητα δεν υπάρχουν σωστές ή λάθος απαντήσεις. Θέλουμε να σε γνωρίσουμε σαν άνθρωπο, όχι σαν βιογραφικό.</div><div class="fg">';
  for(var i=0;i<pQ.length;i++){ids.push(pQ[i].id);h+=oq(pQ[i])}
  h+='</div><div class="br"><button class="bb" id="x1">←</button><button class="bn" id="b1">Χαρακτήρας →</button></div></div>';
  G("ct").innerHTML=h;
  G("x1").onclick=function(){gr(ids);sec=0;go()};G("b1").onclick=function(){gr(ids);sec=2;go()};
}

// ── 2 CHARACTER ──
function r2(){
  var oi=[];var h='<div class="sc"><div class="tt">Χαρακτήρας &amp; Τρόπος Σκέψης</div><div class="su">Εδώ βλέπουμε πώς αντιδράς σε καταστάσεις, τι σε κινητοποιεί, και αν έχεις χιούμορ.</div><div class="fg">';
  for(var i=0;i<cQ.length;i++){var q=cQ[i];
    if(q.t==="o"){oi.push(q.id);h+=oq(q)}
    else if(q.t==="m"){h+='<div class="cd"><div class="qt">'+E(q.q)+'</div>';for(var j=0;j<q.o.length;j++)h+='<div class="op'+(an[q.id]===q.o[j]?" s":"")+'" data-q="'+q.id+'" data-v="'+E(q.o[j])+'">'+E(q.o[j])+"</div>";h+="</div>"}
    else if(q.t==="s"){h+='<div class="cd"><div class="qt">'+E(q.q)+'</div><div class="sk">';for(var j=0;j<q.sl.length;j++){var v=j+1;h+='<div class="si'+(an[q.id]===v?" s":"")+'" data-q="'+q.id+'" data-v="'+v+'"><div class="sn">'+v+'</div><div class="sl">'+E(q.sl[j])+"</div></div>"}h+="</div></div>"}}
  h+='</div><div class="br"><button class="bb" id="x2">←</button><button class="bn" id="b2">Personality Test →</button></div></div>';
  G("ct").innerHTML=h;
  var ops=G("ct").querySelectorAll(".op");for(var i=0;i<ops.length;i++)ops[i].onclick=function(){an[this.getAttribute("data-q")]=this.getAttribute("data-v");cl(this.parentNode,"op",this)};
  var sis=G("ct").querySelectorAll(".si");for(var i=0;i<sis.length;i++)sis[i].onclick=function(){an[this.getAttribute("data-q")]=parseInt(this.getAttribute("data-v"));cl(this.parentNode,"si",this)};
  G("x2").onclick=function(){gr(oi);sec=1;go()};G("b2").onclick=function(){gr(oi);sec=3;mq=0;go()};
}

// ── 3 MBTI (Likert 1-7) ──
function r3(){
  var q=mQ[mq];
  var sizes=[14,18,22,24,22,18,14]; // dot sizes for 7-point scale
  var h='<div class="sc"><div class="tt">Personality Test</div><div class="su">Ερώτηση '+(mq+1)+' από '+mQ.length+'. Κάνε χρήση της κλίμακας — δεν υπάρχει σωστό ή λάθος.</div>';
  h+='<div class="cd"><div class="qt" style="font-size:15px;margin-bottom:14px">'+E(q.q)+'</div>';
  h+='<div class="lk">';
  h+='<div class="lk-labels"><span>'+E(q.lo)+'</span><span>'+E(q.hi)+'</span></div>';
  h+='<div class="lk-row">';
  for(var i=1;i<=7;i++){
    h+='<div class="lk-dot'+(ma[mq]===i?" s":"")+'" data-v="'+i+'"><i style="width:'+sizes[i-1]+'px;height:'+sizes[i-1]+'px"></i></div>';
  }
  h+='</div></div></div>';
  h+='<div class="dt">';for(var i=0;i<mQ.length;i++)h+='<i class="'+(i===mq?"ac":ma[i]?"dn":"")+'"></i>';h+='</div>';
  h+='<div class="br"><button class="bb" id="x3">←</button><button class="bn" id="b3"'+(ma[mq]==null?" disabled":"")+'>'+(mq<mQ.length-1?"Επόμενη →":"Σενάρια →")+'</button></div></div>';
  G("ct").innerHTML=h;
  var dots=G("ct").querySelectorAll(".lk-dot");
  for(var i=0;i<dots.length;i++)dots[i].onclick=function(){ma[mq]=parseInt(this.getAttribute("data-v"));r3()};
  G("x3").onclick=function(){if(mq>0){mq--;r3()}else{sec=2;go()}};
  G("b3").onclick=function(){if(ma[mq]==null)return;if(mq<mQ.length-1){mq++;r3()}else{sec=4;go()}};
}

// ── 4 SCENARIOS ──
function r4(){
  var ids=[];var h='<div class="sc"><div class="tt">Σενάρια &amp; Τεχνική Σκέψη</div><div class="su">Αυτές οι ερωτήσεις δεν έχουν μία σωστή απάντηση. Μας ενδιαφέρει η σκέψη σου, η λογική, και πώς δομείς ένα πρόβλημα. Γράψε ελεύθερα.</div><div class="fg">';
  for(var i=0;i<sQ.length;i++){ids.push(sQ[i].id);h+=oq(sQ[i],true)}
  h+='</div><div class="br"><button class="bb" id="x4">←</button><button class="bn" id="b4">Υποβολή ✓</button></div></div>';
  G("ct").innerHTML=h;
  G("x4").onclick=function(){gr(ids);mq=mQ.length-1;sec=3;go()};
  G("b4").onclick=function(){
    gr(ids);
    var mt=mbtiCalc(),mn=TN[mt]||mt;
    // Build MBTI detail scores
    var dims={EI:[],SN:[],TF:[],JP:[]};
    for(var k in ma){if(ma.hasOwnProperty(k)){var q2=mQ[parseInt(k)];if(q2)dims[q2.d].push(ma[k])}}
    function avg(a){if(!a.length)return 4;var s=0;for(var i=0;i<a.length;i++)s+=a[i];return Math.round(s/a.length*10)/10}
    var mbtiDetail="EI:"+avg(dims.EI)+" SN:"+avg(dims.SN)+" TF:"+avg(dims.TF)+" JP:"+avg(dims.JP);
    
    var pl={name:inf.n,email:inf.e,phone:inf.p,year:inf.y,direction:inf.d,interest:inf.i,answers:JSON.parse(JSON.stringify(an)),mbtiAnswers:JSON.parse(JSON.stringify(ma)),mbtiType:mt,mbtiName:mn,mbtiDetail:mbtiDetail,timestamp:Date.now()};
    var ov=document.createElement("div");ov.className="ov";ov.innerHTML='<div class="sp2"></div><div style="color:#00d4aa;font-size:13px;margin-top:14px">Αποστολή...</div>';document.body.appendChild(ov);
    function done(){if(ov.parentNode)ov.parentNode.removeChild(ov);sec=5;go()}
    if(SHEET_URL.indexOf("script.google.com")!==-1){var x=new XMLHttpRequest();x.open("POST",SHEET_URL,true);x.setRequestHeader("Content-Type","text/plain");x.onload=done;x.onerror=done;x.send(JSON.stringify(pl))}
    else{console.log("Payload:",pl);setTimeout(done,400)}
  };
}

    '<div style="margin-top:30px;padding:14px 24px;background:#101018;border:1px solid #1a1a28;border-radius:10px;display:inline-block;font-family:Courier,monospace;font-size:12px;color:#00d4aa">componous.gr</div>'+
  '</div>';
  G("pv").style.width="100%";
}

G("ltap").onclick=function(){};
go();
})();
